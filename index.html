<!DOCTYPE html>
<html>
<head>
    <title>Employee Task Manager</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .add { background: #667eea; }
        .load { background: #28a745; }
        .delete { background: red; }
        .update { background: orange; }

        li {
            background: #f4f4f4;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Employee Task Manager</h2>

<h3>Add Employee</h3>
<input id="name" placeholder="Name">
<input id="role" placeholder="Role">
<input id="task" placeholder="Task">
<button class="add" onclick="addEmployee()">Add</button>

<hr>

<h3>Employee List</h3>
<button class="load" onclick="getEmployees()">Load Employees</button>
<ul id="list"></ul>

</div>

<script src="env-config.js"></script>
<script>

const API_URL = window.APP_CONFIG?.AMAXO_URL || "https://e6t8fehup5.execute-api.eu-north-1.amazonaws.com/EmployeeOps/employees";

async function addEmployee() {
    const data = {
        name: document.getElementById("name").value.trim(),
        role: document.getElementById("role").value.trim(),
        task: document.getElementById("task").value.trim()
    };

    console.log(data);

    if (!data.name || !data.role || !data.task) {
        alert("Please fill all fields");
        return;
    }

    const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await res.json();
    console.log(result);

    alert(result.message || "Added");
    getEmployees();
}

async function getEmployees() {
    const res = await fetch(API_URL);
    const data = await res.json();

    list.innerHTML = "";

    data.forEach(emp => {
        const li = document.createElement("li");

        li.innerHTML = `
            <b>${emp.name}</b> (${emp.role}) - ${emp.task} [${emp.status}]
            <br>
            <button class="update" onclick="updateEmployee('${emp.id}')">Update</button>
            <button class="delete" onclick="deleteEmployee('${emp.id}')">Delete</button>
        `;

        list.appendChild(li);
    });
}

async function deleteEmployee(id) {
    await fetch(API_URL + "?id=" + id, {
        method: "DELETE"
    });

    alert("Deleted");
    getEmployees();
}

async function updateEmployee(id) {
    const newTask = prompt("Enter new task:");
    const newStatus = prompt("Enter status (pending/done):");

    await fetch(API_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: id,
            task: newTask,
            status: newStatus
        })
    });

    alert("Updated");
    getEmployees();
}

</script>

</body>
</html>
